spring.application.name=demo

# ===== DataSource (H2 内存数据库，本地调试用) =====
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== H2 Console =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Server =====
server.port=8080

# ===== DeepSeek API =====
deepseek.api.key=sk-03ccba95ff904f60892357e2ef90c06b
deepseek.api.url=https://api.deepseek.com/chat/completions
deepseek.model=deepseek-v4-flash
deepseek.max-tokens=2048
deepseek.prompt-template=classpath:prompts/stock-advisor.txt
deepseek.timeout.connect=5000
deepseek.timeout.read=30000
deepseek.retry.max-attempts=3
deepseek.retry.initial-delay=1000
deepseek.embedding.url=https://api.deepseek.com/v1/embeddings
deepseek.embedding.model=deepseek-chat
